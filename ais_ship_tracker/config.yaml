name: "AIS Ship Tracker"
version: "1.3.0"
slug: "ais_ship_tracker"
description: "Tracks passing ships via AISStream"
url: "https://github.com/buttermilkgreen/ais_ship_tracker" 
arch:
  - "aarch64"
  - "amd64"
  - "armv7"
startup: "services"
boot: "auto"
icon: "icon.png"
init: false
homeassistant_api: true
options:
  api_key: ""
  longitude_west: 1.20
  latitude_south: 50.90
  longitude_east: 1.80
  latitude_north: 51.20
  include_class_b: false
  enable_map_entities: false
  map_timeout_minutes: 30
  clear_map_on_startup: false
  dev_mode: false
schema:
  api_key: "password"
  longitude_west: "float"
  latitude_south: "float"
  longitude_east: "float"
  latitude_north: "float" 
  include_class_b: "bool?"
  enable_map_entities: "bool?"
  map_timeout_minutes: "int?"
  clear_map_on_startup: "bool?"
  dev_mode: "bool?"