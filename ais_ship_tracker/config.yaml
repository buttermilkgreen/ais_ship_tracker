  "arch": ["aarch64", "amd64", "armv7"],
  "startup": "services",
  "boot": "auto",
  "icon": "icon.png",
  "init": false,
  "homeassistant_api": true,
  "options": {
    "api_key": "",
    "bounding_box": "[[[50.90, 1.20], [51.20, 1.80]]]"
  },
  "schema": {
    "api_key": "password",
    "bounding_box": "str",
  }
}