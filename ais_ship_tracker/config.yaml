name: "AIS Ship Tracker"
version: "1.1.0"
slug: "ais_ship_tracker"
description: "Tracks passing ships via AISStream and updates an entity: Last Passing Ship"
url: "https://github.com/buttermilkgreen/ais_ship_tracker" 
arch:
  - "aarch64"
  - "amd64"
  - "armv7"
startup: "services"
boot: "auto"
icon: "icon.png"
init: false
homeassistant_api: true
options:
  api_key: ""
  latitude_south: 50.90
  longitude_west: 1.20
  latitude_north: 51.20
  longitude_east: 1.80
  dev_mode: false
schema:
  api_key: "password"
  latitude_south: "float"
  longitude_west: "float"
  latitude_north: "float"
  longitude_east: "float"
  dev_mode: "bool?"
